name: Frontend CI

on:
  push:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npx vitest run
      - run: npx firebase emulators:exec --only firestore "npx vitest run src/firebase/__tests__/firestoreRules.spec.ts"
