name: Frontend CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]
    types: [opened, synchronize, reopened]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: pre-merge-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npx vitest run
      - run: npx firebase emulators:exec --only firestore "npx vitest run src/firebase/__tests__/firestoreRules.spec.ts"

  e2e-tests:
    name: e2e-tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: []
    env:
      VITE_FIREBASE_API_KEY: "dummy-api-key"
      VITE_FIREBASE_AUTH_DOMAIN: "dummy-auth-domain"
      VITE_FIREBASE_PROJECT_ID: "dummy-project-id"
      VITE_FIREBASE_APP_ID: "dummy-app-id"
      VITE_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
      VITE_FIREBASE_STORAGE_BUCKET: "dummy-bucket"
      VITE_FIREBASE_USE_EMULATOR: "true"
      VITE_FIRESTORE_EMULATOR_HOST: "127.0.0.1"
      VITE_FIRESTORE_EMULATOR_PORT: "8080"
      VITE_FIREBASE_AUTH_EMULATOR_URL: "http://127.0.0.1:9099"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java (for Firebase emulators)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps
        working-directory: frontend

      - name: Install Firebase CLI
        run: npm install --global firebase-tools

      - name: E2E Tests
        run: npx firebase emulators:exec --only auth,firestore --project gen-lang-client-0613258198 "npx playwright test"
        working-directory: frontend

      - name: Upload Playwright Report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload Test Results (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: frontend/test-results/
          retention-days: 7
